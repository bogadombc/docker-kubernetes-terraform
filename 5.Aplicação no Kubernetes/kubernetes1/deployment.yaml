apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-k8s
  namespace: curso-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-k8s
  template:
    metadata:
      labels:
        app: app-k8s
    spec:
      containers:
        - name: app
          image: app-k8s-modulo5:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: APP_NAME
              value: "Aplicação no Kubernetes"
            - name: APP_VERSION
              value: "v1"